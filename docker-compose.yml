# AgentOps self-host
#
# Quick start:
#   docker compose up -d
#   docker compose exec dashboard agentops user add ian@example.com
#
# The first command prints a one-time temp password. The user changes it on
# first browser login at http://localhost:3000/login.
#
# To send CLI hook events to this dashboard from a developer machine:
#   agentops login --server http://<your-dashboard-host>:3000
#   agentops setup
#
# Persistent data lives in ./agentops-data/ on the host. For continuous
# replicated backup to S3, start the litestream sidecar:
#   docker compose --profile backup up -d
# (See litestream.yml + the "Disaster recovery" section in README.md.)
# Without litestream you can still back up by stopping the dashboard and
# copying ./agentops-data/, but you lose point-in-time recovery.
#
# Production deployment with HTTPS:
#   1. Point DNS at this host (e.g. agentops.acme.com A <public-ip>)
#   2. Open ports 80 + 443 on the host firewall
#   3. Set AGENTOPS_HOSTNAME + LETSENCRYPT_EMAIL in .env
#   4. docker compose --profile production up -d
# See README's "Production deployment" section + Caddyfile.

services:
  dashboard:
    build: .
    image: agentops:latest
    container_name: agentops-dashboard
    restart: unless-stopped
    ports:
      # Bind to 127.0.0.1 by default. Change to "0.0.0.0:3000:3000" or just
      # "3000:3000" if you want the dashboard reachable on the LAN — but do
      # not expose it to the public internet without a reverse proxy that
      # terminates TLS, since the API requires Bearer tokens but not TLS.
      - "127.0.0.1:3000:3000"
    volumes:
      - ./agentops-data:/data
    environment:
      AGENTOPS_DB_PATH: /data/agentops.db
      # Pass through the Anthropic Admin API key if you set it on the host or
      # in a .env file next to this docker-compose.yml. Leave unset to disable
      # the Usage tab (which proxies to the Admin API).
      ANTHROPIC_ADMIN_API_KEY: ${ANTHROPIC_ADMIN_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        # ~50 MB total per service. Adjust upward if you need a longer log
        # retention window — see `docker compose logs` and the LOG_LEVEL
        # env var for tuning.
        max-size: "10m"
        max-file: "5"

  # ─── Backup sidecar (opt-in via --profile backup) ──────────────────────────
  #
  # Continuously streams the SQLite WAL to S3 (or any S3-compatible store).
  # Configure via the AGENTOPS_S3_* and AWS_* variables in .env, then start:
  #
  #   docker compose --profile backup up -d
  #
  # Disable by simply not starting this profile. See litestream.yml for
  # config and README's "Disaster recovery" for the restore procedure.
  litestream:
    profiles: ["backup"]
    image: litestream/litestream:0.5.0
    container_name: agentops-litestream
    restart: unless-stopped
    depends_on:
      - dashboard
    volumes:
      # Read-write mount: Litestream must be able to open the database with
      # write access — it takes the WAL checkpoint lock and maintains its own
      # -litestream sidecar files next to the db. A :ro mount here breaks
      # replication outright (it fails at startup, it doesn't degrade).
      - ./agentops-data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      AGENTOPS_S3_BUCKET: ${AGENTOPS_S3_BUCKET}
      AGENTOPS_S3_PREFIX: ${AGENTOPS_S3_PREFIX:-agentops}
      AGENTOPS_S3_ENDPOINT: ${AGENTOPS_S3_ENDPOINT:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    command: replicate -config /etc/litestream.yml
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── HTTPS reverse proxy (opt-in via --profile production) ─────────────────
  #
  # Caddy terminates TLS using Let's Encrypt and reverse-proxies to the
  # dashboard over the internal docker network. The dashboard container
  # keeps its 127.0.0.1:3000 binding — Caddy reaches it as "dashboard:3000"
  # via service-name DNS, no host port involved.
  #
  # Customers without public DNS can switch to an internal CA — see the
  # comment block at the top of Caddyfile for the swap.
  caddy:
    profiles: ["production"]
    image: caddy:2-alpine
    container_name: agentops-caddy
    restart: unless-stopped
    depends_on:
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      # Required. Compose will fail loudly if this isn't set.
      AGENTOPS_HOSTNAME: ${AGENTOPS_HOSTNAME:?AGENTOPS_HOSTNAME is required for the production profile}
      # Optional — see Caddyfile and .env.example.
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      AGENTOPS_ACME_CA: ${AGENTOPS_ACME_CA:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  # Caddy persists issued certificates + ACME account here. Backing this
  # up means new container starts don't have to re-issue certs.
  caddy-data:
  caddy-config:
