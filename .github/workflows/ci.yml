name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ESLint runs on source — no build needed. Fails the job on any lint
      # error (warnings are advisory). web uses its Next/React config; the
      # other packages share eslint.config.base.mjs.
      - name: Lint all packages
        run: npm run lint

  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm run test

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # The dashboard imports the built @agentops/* workspace packages, and the
      # Playwright config starts `npm run dev` itself (webServer in
      # packages/web/playwright.config.ts), so we just need everything built and
      # the Chromium binary installed.
      - name: Build all packages
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: packages/web

      - name: Run e2e smoke tests
        run: npm run test:e2e --workspace=packages/web
